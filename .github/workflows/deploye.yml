name: Deploy Frontend to GCS

on:
  push:
    branches:
      - main  # Triggered when you push to the main branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm install

    - name: Build project
      run: npm run build
      env:
        # If your React app uses environment variables, add them here:
        REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL }}

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up GCloud CLI
      uses: google-github-actions/setup-gcloud@v2

    - name: Upload to GCS
      run: |
        # Synchronize the build folder with your bucket
        # -m: parallel upload (faster)
        # -d: delete files in bucket that aren't in the build folder
        # -r: recursive
        gsutil -m rsync -d -r ./build "gs://${{ secrets.GCP_BUCKET_NAME }}"

    - name: Set Cache-Control for index.html
      run: |
        # Prevent browsers from caching index.html so they always get the latest version
        gsutil setmeta -h "Cache-Control:no-cache, no-store, must-revalidate" "gs://${{ secrets.GCP_BUCKET_NAME }}/index.html"