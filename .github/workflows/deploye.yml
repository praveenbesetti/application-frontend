name: Deploy Frontend to GCS

on:
  push:
    branches:
      - main  # Triggered when you push to the main branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm install

    - name: Build project
      run: npm run build
      env:
        REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL }}

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up GCloud CLI
      uses: google-github-actions/setup-gcloud@v2

    - name: Upload and Fix MIME Types
      run: |
        # 1. Sync the build folder (Uploads everything)
        gsutil -m rsync -d -r ./build "gs://${{ secrets.GCP_BUCKET_NAME }}"

        # 2. FORCE CSS MIME type (Fixes the broken styles in your screenshot)
        gsutil -m setmeta -h "Content-Type:text/css" "gs://${{ secrets.GCP_BUCKET_NAME }}/static/css/*.css"

        # 3. FORCE JS MIME type (Ensures buttons/logic work)
        gsutil -m setmeta -h "Content-Type:application/javascript" "gs://${{ secrets.GCP_BUCKET_NAME }}/static/js/*.js"

    - name: Set Cache-Control for index.html
      run: |
        # Prevent browsers from caching index.html so updates show up immediately
        gsutil setmeta -h "Cache-Control:no-cache, no-store, must-revalidate" "gs://${{ secrets.GCP_BUCKET_NAME }}/index.html"